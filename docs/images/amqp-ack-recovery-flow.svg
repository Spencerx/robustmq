<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 340" font-family="'SF Mono', 'Menlo', 'Consolas', monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#111111"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#888888"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="860" height="340" fill="#ffffff"/>
  <text x="0" y="26" font-size="15" font-weight="700" fill="#111111">Crash Recovery &#8212; One Index Topic, One Scanner</text>
  <text x="0" y="44" font-size="11" fill="#666666">the synchronous path covers the normal case; the scanner is the backstop</text>

  <rect x="0" y="70" width="260" height="66" stroke="#111111" fill="none"/>
  <text x="8" y="92" font-size="11.5" fill="#111111">graceful channel/connection</text>
  <text x="8" y="108" font-size="11.5" fill="#111111">close</text>
  <text x="8" y="126" font-size="10" fill="#666666">synchronous, drains its own entries</text>

  <rect x="300" y="70" width="260" height="66" stroke="#111111" stroke-dasharray="4 3" fill="none"/>
  <text x="308" y="92" font-size="11.5" fill="#111111">index topic (cluster-shared)</text>
  <text x="308" y="110" font-size="10" fill="#666666">tenant, queue, offset, conn,</text>
  <text x="308" y="124" font-size="10" fill="#666666">channel, broker_id, timestamp</text>

  <rect x="600" y="70" width="240" height="66" stroke="#111111" fill="none"/>
  <text x="608" y="92" font-size="11.5" fill="#111111">scanner on the meta</text>
  <text x="608" y="108" font-size="11.5" fill="#111111">Raft leader</text>
  <text x="608" y="126" font-size="10" fill="#666666">exactly one instance, cluster-wide</text>

  <line x1="130" y1="136" x2="130" y2="160" stroke="#888888" stroke-dasharray="3 3"/>
  <text x="140" y="152" font-size="10" fill="#888888">writes entries</text>
  <line x1="430" y1="136" x2="430" y2="160" stroke="#111111" marker-end="url(#arrow)"/>
  <line x1="720" y1="136" x2="720" y2="160" stroke="#111111" marker-end="url(#arrow)"/>

  <rect x="330" y="160" width="200" height="40" stroke="#111111" fill="none"/>
  <text x="338" y="184" font-size="11" fill="#111111">read entire index topic</text>

  <line x1="530" y1="180" x2="600" y2="180" stroke="#111111" marker-end="url(#arrow)"/>

  <rect x="600" y="160" width="240" height="40" stroke="#111111" fill="none"/>
  <text x="608" y="184" font-size="11" fill="#111111">age &gt; threshold ?</text>

  <line x1="430" y1="200" x2="430" y2="220" stroke="#111111" marker-end="url(#arrow)"/>
  <path d="M 720 200 C 720 260, 530 260, 530 220" fill="none" stroke="#111111" marker-end="url(#arrow)"/>

  <rect x="330" y="220" width="200" height="40" stroke="#111111" fill="none"/>
  <text x="338" y="244" font-size="11" fill="#111111">requeue_message()</text>

  <text x="0" y="290" font-size="11" fill="#111111">reclaim condition: entry age &gt; configured threshold, regardless of broker_id</text>
  <text x="0" y="308" font-size="10.5" fill="#666666">no channel-liveness check &#8212; the scanner is usually not on the node that owns the connection</text>
  <text x="0" y="326" font-size="10.5" fill="#666666">index entry is written before the offset commit in Basic.Get, so a crash between the two never orphans a message</text>
</svg>
