<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 336" font-family="'SF Mono', 'Menlo', 'Consolas', monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#111111"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="860" height="336" fill="#ffffff"/>
  <text x="0" y="26" font-size="15" font-weight="700" fill="#111111">Requeue &#8212; One Function, Multiple Callers</text>
  <text x="0" y="44" font-size="11" fill="#666666">writes back to the same queue, never through exchange routing</text>

  <!-- triggers -->
  <text x="0" y="80" font-size="12.5" font-weight="700" fill="#111111">callers</text>
  <g font-size="11" fill="#111111">
    <rect x="0" y="92" width="230" height="30" stroke="#111111" fill="none"/>
    <text x="8" y="112">Nack(requeue=true)</text>
    <rect x="0" y="128" width="230" height="30" stroke="#111111" fill="none"/>
    <text x="8" y="148">Reject(requeue=true)</text>
    <rect x="0" y="164" width="230" height="30" stroke="#111111" fill="none"/>
    <text x="8" y="184">Recover(requeue=true)</text>
    <rect x="0" y="200" width="230" height="30" stroke="#111111" fill="none"/>
    <text x="8" y="220">channel / connection close</text>
    <rect x="0" y="236" width="230" height="30" stroke="#111111" fill="none"/>
    <text x="8" y="256">recovery scanner</text>
  </g>

  <line x1="230" y1="107" x2="290" y2="140" stroke="#111111" marker-end="url(#arrow)"/>
  <line x1="230" y1="143" x2="290" y2="145" stroke="#111111" marker-end="url(#arrow)"/>
  <line x1="230" y1="179" x2="290" y2="150" stroke="#111111" marker-end="url(#arrow)"/>
  <line x1="230" y1="215" x2="290" y2="155" stroke="#111111" marker-end="url(#arrow)"/>
  <line x1="230" y1="251" x2="290" y2="160" stroke="#111111" marker-end="url(#arrow)"/>

  <!-- shared primitive -->
  <rect x="300" y="92" width="260" height="180" stroke="#111111" stroke-width="1.4" fill="none"/>
  <text x="310" y="116" font-size="12.5" font-weight="700" fill="#111111">requeue_message()</text>
  <line x1="310" y1="128" x2="550" y2="128" stroke="#cccccc"/>
  <text x="310" y="150" font-size="11" fill="#111111">1. read original record</text>
  <text x="310" y="172" font-size="11" fill="#111111">2. set redelivered = true</text>
  <text x="310" y="194" font-size="11" fill="#111111">3. write to queue tail</text>
  <text x="310" y="216" font-size="11" fill="#111111">4. delete original offset</text>
  <text x="310" y="238" font-size="11" fill="#111111">5. delete index entry</text>
  <text x="310" y="260" font-size="10" fill="#666666">no exchange lookup, no re-routing</text>

  <!-- output -->
  <line x1="560" y1="182" x2="620" y2="182" stroke="#111111" marker-end="url(#arrow)"/>
  <rect x="620" y="152" width="220" height="60" stroke="#111111" fill="none"/>
  <text x="628" y="176" font-size="11" fill="#111111">queue tail, new offset</text>
  <text x="628" y="192" font-size="10" fill="#666666">redelivered on next claim</text>

  <text x="0" y="300" font-size="10.5" fill="#666666">the message carries the AMQPProperties saved in protocol_data at Basic.Publish time; only the offset changes</text>
  <text x="0" y="316" font-size="10.5" fill="#666666">write-then-delete order: a crash mid-sequence can duplicate the message, never lose it</text>
</svg>
