<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" font-family="'SF Mono', 'Menlo', 'Consolas', monospace">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#111111"/>
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto">
      <path d="M0,0 L6,2.5 L0,5 Z" fill="#888888"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="860" height="460" fill="#ffffff"/>
  <text x="0" y="26" font-size="15" font-weight="700" fill="#111111">Basic.Get &#8212; Conditional Write Instead of a Lock</text>
  <text x="0" y="44" font-size="11" fill="#666666">no held state across broker nodes; a failed commit just retries</text>

  <g stroke="#111111" stroke-width="1" fill="none">
    <rect x="0" y="70" width="200" height="46"/>
    <rect x="0" y="146" width="200" height="46"/>
    <rect x="0" y="222" width="200" height="46"/>
    <rect x="0" y="298" width="200" height="46"/>
  </g>
  <text x="10" y="90" font-size="12" fill="#111111">1. read current offset</text>
  <text x="10" y="106" font-size="10" fill="#666666">get_offset_data(tenant, group)</text>

  <text x="10" y="166" font-size="12" fill="#111111">2. read message at offset</text>
  <text x="10" y="182" font-size="10" fill="#666666">read_by_offset(shard, offset)</text>

  <text x="10" y="242" font-size="12" fill="#111111">3. write unacked index entry</text>
  <text x="10" y="258" font-size="10" fill="#666666">internal topic, before step 4</text>

  <text x="10" y="318" font-size="12" fill="#111111">4. commit offset + 1</text>
  <text x="10" y="334" font-size="10" fill="#666666">save_offset_data(expected = step 1)</text>

  <line x1="100" y1="116" x2="100" y2="143" stroke="#111111" marker-end="url(#arrow)"/>
  <line x1="100" y1="192" x2="100" y2="219" stroke="#111111" marker-end="url(#arrow)"/>
  <line x1="100" y1="268" x2="100" y2="295" stroke="#111111" marker-end="url(#arrow)"/>

  <rect x="290" y="298" width="230" height="66" stroke="#111111" fill="none"/>
  <text x="300" y="320" font-size="12" fill="#111111">conflict: stored value</text>
  <text x="300" y="336" font-size="12" fill="#111111">no longer equals expected</text>
  <text x="300" y="354" font-size="10" fill="#666666">reject, no state left behind</text>

  <line x1="200" y1="315" x2="287" y2="315" stroke="#888888" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>
  <text x="210" y="308" font-size="10" fill="#888888">reject</text>

  <path d="M 290 331 C 240 400, 140 400, 100 344" fill="none" stroke="#888888" stroke-dasharray="4 3" marker-end="url(#arrowGray)"/>
  <text x="150" y="404" font-size="10" fill="#888888">retry from step 1</text>

  <rect x="290" y="70" width="230" height="66" stroke="#111111" fill="none"/>
  <text x="300" y="92" font-size="12" fill="#111111">success: assign delivery_tag</text>
  <text x="300" y="108" font-size="12" fill="#111111">send GetOk / Header / Body</text>
  <text x="300" y="126" font-size="10" fill="#666666">AmqpChannel.next_delivery_tag</text>
  <line x1="200" y1="103" x2="287" y2="103" stroke="#111111" marker-end="url(#arrow)"/>
  <text x="210" y="96" font-size="10" fill="#111111">match</text>

  <line x1="560" y1="20" x2="560" y2="440" stroke="#cccccc"/>

  <text x="590" y="90" font-size="12" font-weight="700" fill="#111111">not used: GroupConsumer</text>
  <text x="590" y="110" font-size="10.5" fill="#444444">local cache, no cross-node</text>
  <text x="590" y="126" font-size="10.5" fill="#444444">invalidation &#8212; a stale</text>
  <text x="590" y="142" font-size="10.5" fill="#444444">committed offset can be held</text>
  <text x="590" y="158" font-size="10.5" fill="#444444">indefinitely once cached.</text>

  <text x="590" y="210" font-size="12" font-weight="700" fill="#111111">not used: distributed lock</text>
  <text x="590" y="230" font-size="10.5" fill="#444444">no lock primitive exists in</text>
  <text x="590" y="246" font-size="10.5" fill="#444444">meta-service; would need a</text>
  <text x="590" y="262" font-size="10.5" fill="#444444">lease and a reaper for a</text>
  <text x="590" y="278" font-size="10.5" fill="#444444">crashed holder.</text>

  <text x="590" y="330" font-size="12" font-weight="700" fill="#111111">used: conditional write</text>
  <text x="590" y="350" font-size="10.5" fill="#444444">commit(expected, new) checked</text>
  <text x="590" y="366" font-size="10.5" fill="#444444">at the raft-apply layer. No</text>
  <text x="590" y="382" font-size="10.5" fill="#444444">held state, nothing to leak</text>
  <text x="590" y="398" font-size="10.5" fill="#444444">on a node crash.</text>

  <line x1="0" y1="430" x2="860" y2="430" stroke="#cccccc"/>
  <text x="0" y="452" font-size="10.5" fill="#666666">an AMQP queue is a single-partition shard, so the conditional write only ever contends on one (tenant, queue) key</text>
</svg>
