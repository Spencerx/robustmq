<svg xmlns="http://www.w3.org/2000/svg" width="900" height="500" viewBox="0 0 900 500" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#5b6b7b"/>
    </marker>
    <style>
      .ltitle { font-size: 12.5px; font-weight: 700; fill: #33475b; }
      .btext { font-size: 12px; fill: #1f2d3d; }
      .stext { font-size: 10.5px; fill: #1f2d3d; }
      .note { font-size: 10.5px; fill: #6b7b8b; }
      .mono { font-size: 10.5px; fill: #1f2d3d; font-family: 'SFMono-Regular', Consolas, monospace; }
    </style>
  </defs>

  <rect x="0" y="0" width="900" height="500" fill="#ffffff"/>
  <text x="30" y="28" font-size="18" font-weight="700" fill="#1f2d3d">RobustMQ Kafka &#183; File Segment Storage</text>
  <text x="30" y="46" class="note">Protocol-neutral decoded records &#183; RecordBatch unpacked on write, reframed on Fetch</text>

  <!-- Write path -->
  <rect x="30" y="66" width="250" height="86" rx="9" fill="#eef7f0" stroke="#cfe9d6"/>
  <text x="44" y="84" class="ltitle">Produce (write)</text>
  <text x="44" y="104" class="stext">1. Decode RecordBatch</text>
  <text x="44" y="121" class="stext">2. Split into single records</text>
  <text x="44" y="138" class="stext">3. Append, assign offsets in order</text>

  <!-- Read path -->
  <rect x="620" y="66" width="250" height="86" rx="9" fill="#eef4fb" stroke="#cfe0f2"/>
  <text x="634" y="84" class="ltitle">Fetch (read)</text>
  <text x="634" y="104" class="stext">1. offset &#8594; index lookup</text>
  <text x="634" y="121" class="stext">2. mmap read at position</text>
  <text x="634" y="138" class="stext">3. Reframe into RecordBatch</text>

  <!-- Shard / segments -->
  <rect x="30" y="176" width="840" height="180" rx="9" fill="#fbf4ec" stroke="#f2e2cf"/>
  <text x="44" y="196" class="ltitle">Shard (topic-partition) &#183; append-only segments</text>

  <!-- Segment 0 sealed -->
  <rect x="50" y="210" width="230" height="60" rx="7" fill="#f7efe4" stroke="#d9862a"/>
  <text x="60" y="228" class="stext" font-weight="700">Segment 0 &#183; sealed</text>
  <text x="60" y="246" class="mono">offset 0 .. 999</text>
  <text x="60" y="262" class="note">immutable</text>

  <!-- Segment 1 sealed -->
  <rect x="296" y="210" width="230" height="60" rx="7" fill="#f7efe4" stroke="#d9862a"/>
  <text x="306" y="228" class="stext" font-weight="700">Segment 1 &#183; sealed</text>
  <text x="306" y="246" class="mono">offset 1000 .. 1999</text>
  <text x="306" y="262" class="note">immutable</text>

  <!-- Active segment -->
  <rect x="542" y="210" width="308" height="60" rx="7" fill="#ffffff" stroke="#d9862a" stroke-width="2"/>
  <text x="552" y="228" class="stext" font-weight="700">Segment N &#183; active (append)</text>
  <text x="552" y="246" class="mono">offset 2000 .. (HW) &#8594;</text>
  <text x="552" y="262" class="note">scroll &amp; seal near max_segment_size</text>

  <!-- scroll arrows -->
  <line x1="280" y1="240" x2="296" y2="240" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>
  <line x1="526" y1="240" x2="542" y2="240" stroke="#5b6b7b" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- offset index -->
  <rect x="50" y="288" width="476" height="52" rx="7" fill="#ffffff" stroke="#8e6fce"/>
  <text x="60" y="306" class="stext" font-weight="700">offset &#8594; position index (mmap)</text>
  <text x="60" y="326" class="mono">1000&#8594;0  1024&#8594;41KB  1048&#8594;83KB  &#8230;</text>

  <!-- ISR -->
  <rect x="542" y="288" width="308" height="52" rx="7" fill="#fdeef0" stroke="#d24b63"/>
  <text x="552" y="306" class="stext" font-weight="700">ISR replication</text>
  <text x="552" y="326" class="stext">leader_epoch fencing &#183; multi-replica</text>

  <!-- connectors write/read to shard -->
  <line x1="155" y1="152" x2="155" y2="176" stroke="#3aa564" stroke-width="1.4" marker-end="url(#arrow)"/>
  <line x1="745" y1="176" x2="745" y2="152" stroke="#4a90d9" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- multi-protocol note box -->
  <rect x="30" y="378" width="840" height="92" rx="9" fill="#f3f0fb" stroke="#ddd3f2"/>
  <text x="44" y="398" class="ltitle">One store, multiple protocol views</text>
  <text x="44" y="420" class="stext">Records are stored decoded, not as a Kafka-private byte layout &#8212; so the same topic can also be read/written by MQTT.</text>
  <text x="44" y="440" class="stext">Trade-off vs native Kafka: no "store-compressed-batch + zero-copy Fetch"; RobustMQ re-encodes a RecordBatch per Fetch.</text>
  <text x="44" y="460" class="note">Batch writes assign contiguous offsets in input order; the batch base offset is the first assigned offset.</text>
</svg>
