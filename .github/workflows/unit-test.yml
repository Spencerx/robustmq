name: Unit Test

on:
  push:
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"

# Cancel previous runs if a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_BUILD_JOBS: 16

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: clippy, rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler cmake pkg-config libssl-dev libsasl2-dev libcurl4-openssl-dev libzstd-dev
          protoc --version
          cmake --version

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Setup sccache
        uses: ./.github/actions/setup-sccache

      - name: Disable incremental compilation (required for sccache)
        run: echo "CARGO_INCREMENTAL=0" >> $GITHUB_ENV

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "unit-test"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}

      - name: Cache HuggingFace model files
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface/hub
          key: hf-fastembed-xenova-all-minilm-l6-v2-v1-${{ runner.os }}
          restore-keys: |
            hf-fastembed-xenova-all-minilm-l6-v2-v1-

      - name: Pre-download fastembed embedding model
        run: |
          pip install -q huggingface_hub
          python3 - <<'EOF'
          import os
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id="Xenova/all-MiniLM-L6-v2",
              allow_patterns=[
                  "onnx/model_quantized.onnx",
                  "tokenizer.json",
                  "config.json",
                  "special_tokens_map.json",
                  "tokenizer_config.json",
              ],
              cache_dir=os.path.expanduser("~/.cache/huggingface/hub"),
          )
          print("fastembed model ready")
          EOF

      - name: Run unit tests
        id: run-tests
        run: make test
        continue-on-error: true

      - name: Test Summary
        if: always()
        shell: bash
        run: |
          echo "## 🧪 Unit Test Results" >> $GITHUB_STEP_SUMMARY
          echo "Debug: outcome = ${{ steps.run-tests.outcome }}" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.run-tests.outcome }}" != "success" ]; then
            echo "❌ Some tests failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
