# Auto Release Workflow
#
# Triggers when a PR with title starting with "release:" is merged into main.
# Builds and uploads packages for linux-amd64, linux-arm64, darwin-amd64 and darwin-arm64.
# Also builds and pushes multi-arch Docker images to ghcr.io.
#
# PR title format: "release: v0.3.0"

name: Release

on:
  pull_request_target:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    name: Build & Release (${{ matrix.platform }})
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'release:')
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-amd64
            runner: ubuntu-22.04
          - platform: linux-arm64
            runner: ubuntu-22.04-arm
          - platform: darwin-amd64
            runner: macos-15-intel
          - platform: darwin-arm64
            runner: macos-14
          - platform: windows-amd64
            runner: windows-2022

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: main
          submodules: true

      - name: Free disk space (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          sudo apt-get clean
          df -h

      - name: Configure 8GB swap (linux-arm64 only, prevent OOM during link)
        if: matrix.platform == 'linux-arm64'
        run: |
          sudo swapoff -a || true
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          echo "vm.swappiness=10" | sudo tee -a /etc/sysctl.conf
          sudo sysctl -p
          free -h

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler cmake pkg-config libssl-dev libsasl2-dev libcurl4-openssl-dev libzstd-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install protobuf cmake

      - name: Install system dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install protoc cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          echo "C:\Program Files\CMake\bin" >> $env:GITHUB_PATH
          # Set OpenSSL env vars so openssl-sys can find the pre-installed OpenSSL
          $opensslDir = "C:\Program Files\OpenSSL-Win64"
          if (-not (Test-Path $opensslDir)) { $opensslDir = "C:\Program Files\OpenSSL" }
          echo "OPENSSL_DIR=$opensslDir" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js (for frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('build/robustmq-copilot/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-${{ matrix.platform }}"
          save-if: "true"

      - name: Install jq (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install jq -y

      - name: Run make release (linux-arm64; reduced parallelism + no LTO to avoid OOM)
        if: matrix.platform == 'linux-arm64'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_BUILD_JOBS: '2'
          CARGO_PROFILE_RELEASE_LTO: 'false'
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: '16'
        run: |
          echo "Building and releasing for ${{ matrix.platform }} (memory-constrained)"
          make release

      - name: Run make release (Linux / macOS, other targets)
        if: runner.os != 'Windows' && matrix.platform != 'linux-arm64'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Building and releasing for ${{ matrix.platform }}, version from Cargo.toml"
          make release

      - name: Run release script (Windows)
        if: runner.os == 'Windows'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          echo "Building and releasing for ${{ matrix.platform }}, version from Cargo.toml"
          ./scripts/release.sh

      - name: Summary
        shell: bash
        run: |
          echo "## 🚀 Release - ${{ matrix.platform }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Package built and uploaded successfully" >> $GITHUB_STEP_SUMMARY
          echo "📦 [View Releases](https://github.com/${{ github.repository }}/releases)" >> $GITHUB_STEP_SUMMARY

  docker-release:
    name: Build & Push Docker Image
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.title, 'release:')
    needs: build-and-release
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Detected version: v${VERSION}"

      - name: Set up QEMU (for multi-arch builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/robustmq/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          # No layer cache: this image only downloads a prebuilt release tarball (no
          # compilation), so caching adds no speedup, and exporting the multi-arch
          # layers to the GHA cache overruns the 10GB quota and fails the release with
          # "failed to reserve cache" — after the image has already been pushed.
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## 🐳 Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "✅ Multi-arch image pushed (linux/amd64 + linux/arm64)" >> $GITHUB_STEP_SUMMARY
          echo "📦 \`ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "📦 \`ghcr.io/${{ github.repository }}:latest\`" >> $GITHUB_STEP_SUMMARY
