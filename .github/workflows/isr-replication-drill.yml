name: ISR Replication Drill

on:
  push:
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_BUILD_JOBS: 8

jobs:
  isr-replication-drill:
    name: ISR Replication Drill
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean

      - uses: dtolnay/rust-toolchain@1.97.0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler cmake pkg-config libssl-dev libsasl2-dev libcurl4-openssl-dev libzstd-dev

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "integration-tests"
          cache-on-failure: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run ISR replication chaos drill
        run: |
          echo "## 🧨 ISR Replication Drill" >> $GITHUB_STEP_SUMMARY
          if /bin/bash ./scripts/chaos-drill.sh three_replica_chaos_rolling_kill; then
            echo "✅ ISR replication drill passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ISR replication drill failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
