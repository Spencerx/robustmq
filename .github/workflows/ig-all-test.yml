name: Ig All Test

on:
  push:
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/pull_request_template.md"

# Cancel previous runs if a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_BUILD_JOBS: 8

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 180

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      # Free up disk space on GitHub Actions runners
      - name: Free disk space
        run: |
          echo "==========================================="
          echo "Disk space before cleanup:"
          df -h
          echo "==========================================="
          
          # Remove unnecessary files to free up space
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          sudo apt-get clean
          
          echo "==========================================="
          echo "Disk space after cleanup:"
          df -h
          echo "==========================================="

      - uses: dtolnay/rust-toolchain@1.97.0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler cmake pkg-config libssl-dev libsasl2-dev libcurl4-openssl-dev libzstd-dev

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "integration-tests"
          cache-on-failure: true
          # Only the main branch saves the cache; PR/feature branches read it.
          # This keeps the cache stable (main builds it incrementally) and avoids
          # a timed-out PR job writing a corrupt/incomplete cache.
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Check disk space
        run: |
          echo "=========================================="
          echo "Disk Space Status"
          echo "=========================================="
          df -h
          echo "=========================================="

      - name: Run integration tests with broker
        run: |
          echo "## 🧪 Integration Test Results" >> $GITHUB_STEP_SUMMARY
          if make ig-test-ci; then
            echo "✅ All tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Tests failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
